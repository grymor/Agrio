    <form action="" class="request-form">
<h3 class="title title--no-margin">Contact us</h3>
            <h1 class="about">Write a Message</h1>

<div class="request-form_body">
<div class="request-form_group">
  <div class="request-form_field">
    <label for="request[name]" class="request-form_label sr-only">Name</label>
    <input type="text" class="request-form_input" id="request[name]" name="request[name]" placeholder="Name" required>
    </div>
    <div class="request-form_field">
    <label for="request[email]" class="request-form_label sr-only">Email Address</label>
    <input type="text" class="request-form_input" id="request[email]" name="request[email]" placeholder="Email Address" required>
    </div>
</div>
<div class="request-form_text">
    <label for="request[message]" class="request-form_label sr-only">Write a Message</label>
    <textarea 
    class="request-form_textinput" 
    id="request[message]" 
    name="request[message]" 
    placeholder="Write a Message" 
    required
  ></textarea>
</div>
<button class="btn request-form_btn">Send a Message</button>
</div>
</form>
